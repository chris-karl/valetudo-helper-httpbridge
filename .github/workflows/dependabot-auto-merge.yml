name: Dependabot Auto-Merge

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr:
        description: 'Required — number of the Dependabot PR to check and merge'
        required: true
        type: string
      head:
        description: 'Required — expected head SHA of the PR (aborts if the PR got new commits)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

# One build check per PR; a force-push by Dependabot obsoletes the
# running one.
concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  # The build check must run on the test merge of the PR into current main —
  # not on the PR head alone — so that what gets built is exactly the tree
  # the squash merge will put on main. The builds stamp the predicted
  # release version into the package files first, which makes their
  # binaries identical to the release assets: the auto-release attaches
  # them directly instead of rebuilding (unless main moved in between).
  resolve-test-merge:
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.resolve.outputs.pr }}
      merge_sha: ${{ steps.resolve.outputs.merge_sha }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      skip_build: ${{ steps.resolve.outputs.skip_build }}
      next_tag: ${{ steps.resolve.outputs.next_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The release tag prediction needs the existing tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve the test merge commit to check
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_DISPATCH: ${{ inputs.pr }}
          EXPECTED_HEAD: ${{ inputs.head }}
          PR_EVENT_NUMBER: ${{ github.event.pull_request.number }}
          PR_EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
          RUN_MERGE_SHA: ${{ github.sha }}
        run: .github/scripts/dependabot-auto-merge/resolve-test-merge.sh

  build-linux:
    needs: resolve-test-merge
    # Skipped for PRs that only touch CI files — nothing they change
    # ends up in the binaries.
    if: needs.resolve-test-merge.outputs.merge_sha != '' && needs.resolve-test-merge.outputs.skip_build != 'true'
    runs-on: ubuntu-latest
    outputs:
      tree: ${{ steps.tree.outputs.tree }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-test-merge.outputs.merge_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      # The Node base binaries pkg stitches the app onto are by far the
      # largest downloads of the build.
      - name: Cache pkg base binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build_dependencies/pkg
          key: pkg-fetch-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pkg-fetch-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Stamp the predicted release version
        if: needs.resolve-test-merge.outputs.next_tag != ''
        env:
          NEXT_TAG: ${{ needs.resolve-test-merge.outputs.next_tag }}
        run: npm version --no-git-tag-version --allow-same-version "${NEXT_TAG#v}"

      - name: Build
        run: npm run build

      # The tree hash identifies exactly what was built; the release
      # only reuses the binaries when its own tree is identical.
      - name: Record the tree that was built
        id: tree
        run: |
          git add -A
          echo "tree=$(git write-tree)" >> "$GITHUB_OUTPUT"

      # The release attaches these within minutes and deletes them right
      # after, so the one-day retention only applies to build-check runs
      # that never merge (major updates, superseded rebases) and to failed
      # release runs. When the artifacts are gone, a retried or fresh
      # release run detects that and falls back to rebuilding.
      - name: Upload the assets for reuse by the release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-linux
          path: build/
          retention-days: 1
          overwrite: true

  build-macos:
    needs: resolve-test-merge
    if: needs.resolve-test-merge.outputs.merge_sha != '' && needs.resolve-test-merge.outputs.skip_build != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-test-merge.outputs.merge_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache pkg base binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build_dependencies/pkg
          key: pkg-fetch-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pkg-fetch-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Stamp the predicted release version
        if: needs.resolve-test-merge.outputs.next_tag != ''
        env:
          NEXT_TAG: ${{ needs.resolve-test-merge.outputs.next_tag }}
        run: npm version --no-git-tag-version --allow-same-version "${NEXT_TAG#v}"

      - name: Build
        run: npm run build_mac

      - name: Upload the assets for reuse by the release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-macos
          path: build/
          retention-days: 1
          overwrite: true

  merge:
    needs: [resolve-test-merge, build-linux, build-macos]
    # The builds may have been skipped (CI-only PR), but must not have
    # failed.
    if: >-
      !cancelled() &&
      needs.resolve-test-merge.outputs.pr != '' &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch Dependabot metadata
        if: github.event_name == 'pull_request'
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Dispatch retries are only ever started for PRs that already passed
      # the non-major check below, so they skip the metadata lookup.
      - name: Merge non-major updates
        if: github.event_name == 'workflow_dispatch' || steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ needs.resolve-test-merge.outputs.pr }}
          MERGE_SHA: ${{ needs.resolve-test-merge.outputs.merge_sha }}
          HEAD_SHA: ${{ needs.resolve-test-merge.outputs.head_sha }}
          CHECKED_TREE: ${{ needs.build-linux.outputs.tree }}
        run: .github/scripts/dependabot-auto-merge/merge-pr.sh
