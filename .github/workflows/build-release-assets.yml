name: Build Release Assets

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: 'Tag of the release to upload the assets to'
        required: true
        type: string
      ref:
        description: 'Commit SHA to build (needed while the tag only exists on a draft release)'
        required: true
        type: string

# Read-only floor; the build jobs elevate to the write they need for uploads.
permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    # gh release upload attaches the built binaries to the release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}
          # `npm run build` executes code from this tree; auth is via GH_TOKEN,
          # not git, so keep the writable token out of .git/config.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      # The Node base binaries pkg stitches the app onto are by far the
      # largest downloads of the build.
      - name: Cache pkg base binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build_dependencies/pkg
          key: pkg-fetch-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pkg-fetch-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            ./build/valetudo-helper-httpbridge-windows-x64.exe \
            ./build/valetudo-helper-httpbridge-linux-x64 \
            ./build/valetudo-helper-httpbridge-linux-armv7 \
            --clobber

  build-macos:
    runs-on: macos-latest
    # gh release upload attaches the built binaries to the release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}
          # `npm run build_mac` executes code from this tree; auth is via
          # GH_TOKEN, not git, so keep the writable token out of .git/config.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache pkg base binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build_dependencies/pkg
          key: pkg-fetch-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pkg-fetch-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build_mac

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            ./build/valetudo-helper-httpbridge-macos-arm64 \
            ./build/valetudo-helper-httpbridge-macos-x64 \
            --clobber
