name: Build Release Assets

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        description: 'Tag of the release to upload the assets to'
        required: true
        type: string
      ref:
        description: 'Commit SHA to build (needed while the tag only exists on a draft release)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      # The Node base binaries pkg stitches the app onto are by far the
      # largest downloads of the build.
      - name: Cache pkg base binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build_dependencies/pkg
          key: pkg-fetch-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pkg-fetch-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            ./build/valetudo-helper-httpbridge-windows-x64.exe \
            ./build/valetudo-helper-httpbridge-linux-x64 \
            ./build/valetudo-helper-httpbridge-linux-armv7 \
            --clobber

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache pkg base binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build_dependencies/pkg
          key: pkg-fetch-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            pkg-fetch-${{ runner.os }}-

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build_mac

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            ./build/valetudo-helper-httpbridge-macos-arm64 \
            ./build/valetudo-helper-httpbridge-macos-x64 \
            --clobber
