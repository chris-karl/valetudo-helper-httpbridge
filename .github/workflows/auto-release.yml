name: Auto-Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      # "auto" applies the normal automation rules (release only when
      # everything since the last tag is Dependabot-authored, as the
      # next patch version). Any other value releases the current main
      # unconditionally with that version component bumped — this is
      # how human changes get released, and it resets the baseline so
      # Dependabot auto-releases resume afterwards.
      bump:
        description: 'Optional — version component to bump for a manual release'
        required: false
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      # Safety pin (required): the SHA of the commit to release. A human
      # pastes the commit they reviewed; the automation passes the commit
      # it just merged. If main does not point at it (commits landed
      # after), the run aborts and releases nothing — a release never
      # silently includes more than what was pinned.
      commit:
        description: 'Required — SHA of the commit to release (aborts when main is not exactly there)'
        required: true
        type: string
      # The build check (the pre-merge build in dependabot-auto-merge.yml)
      # hands over its run id and built tree so the release can reuse its
      # binaries instead of rebuilding, when the trees still match.
      checked_run_id:
        description: 'Optional (automation handoff) — ID of the build-check run whose binaries can become the release assets'
        required: false
        type: string
        default: ''
      checked_tree:
        description: 'Optional (automation handoff) — Git tree hash the build-check run built its binaries from'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  # Needed to download the build check's assets.
  actions: read

# Only the latest push to main matters: decide-release.sh inspects all
# commits since the last tag, so a superseded run's decision is redundant.
# Cancelling stale runs prevents runner exhaustion when multiple
# Dependabot PRs merge in quick succession.
concurrency:
  group: auto-release
  cancel-in-progress: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      tag: ${{ steps.decide.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
      reuse: ${{ steps.reuse.outputs.reuse }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      # Same npm as in the build check, so both stamp byte-identical
      # package files (a formatting difference would break asset reuse).
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Decide whether a release should happen and which tag it gets
        id: decide
        env:
          BUMP: ${{ inputs.bump }}
          EXPECTED_COMMIT: ${{ inputs.commit }}
        run: .github/scripts/auto-release/decide-release.sh

      - name: Bump the package version to the release tag
        if: steps.decide.outputs.release == 'true'
        id: bump
        env:
          TAG: ${{ steps.decide.outputs.tag }}
        run: .github/scripts/auto-release/bump-version.sh

      - name: Decide whether the build check's assets match this release
        if: steps.decide.outputs.release == 'true'
        id: reuse
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          CHECKED_RUN_ID: ${{ inputs.checked_run_id }}
          CHECKED_TREE: ${{ inputs.checked_tree }}
          SHA: ${{ steps.bump.outputs.sha }}
        run: .github/scripts/auto-release/decide-asset-reuse.sh

      - name: Create draft release
        if: steps.decide.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.decide.outputs.tag }}
          SHA: ${{ steps.bump.outputs.sha }}
        run: .github/scripts/auto-release/create-draft.sh

  build-assets:
    needs: prepare-release
    if: needs.prepare-release.outputs.release == 'true' && needs.prepare-release.outputs.reuse != 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-release-assets.yml
    with:
      tag: ${{ needs.prepare-release.outputs.tag }}
      ref: ${{ needs.prepare-release.outputs.sha }}

  # When the release tree is identical to what the build check already
  # built, its binaries (stamped with this very version) become the
  # release assets without rebuilding anything.
  attach-checked-assets:
    needs: prepare-release
    if: needs.prepare-release.outputs.release == 'true' && needs.prepare-release.outputs.reuse == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Deleting the attached artifacts needs write access.
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Attach the build check's assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          CHECKED_RUN_ID: ${{ inputs.checked_run_id }}
        run: .github/scripts/auto-release/attach-checked-assets.sh

  # Only runs when all assets were built (or attached) successfully,
  # so a broken build never becomes a public release.
  publish:
    needs: [prepare-release, build-assets, attach-checked-assets]
    if: >-
      !cancelled() &&
      needs.prepare-release.outputs.release == 'true' &&
      (needs.build-assets.result == 'success' || needs.attach-checked-assets.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
